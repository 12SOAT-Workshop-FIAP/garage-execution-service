services:
  postgres-execution:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: execution_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - garage-network

  execution-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3003
      DATABASE_HOST: postgres-execution
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: execution_service
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret}
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      postgres-execution:
        condition: service_healthy
    networks:
      - garage-network

volumes:
  postgres-data:

networks:
  garage-network:
    external: true
